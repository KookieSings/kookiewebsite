<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, user-scalable=yes" />
    <title>Puppy Phone</title>

    <link rel="stylesheet" href="style4links.css" />
</head>
<body>
    <div>
            <div class="phonescreen" role="main">

                <!-- top bar -->
                <div class="top-bar">
                    <div class="brand">WALKIES </div>
                    <div class="signal">
                        <img src="url(assets/signal.gif)" alt="">
                    </div>
                </div>

                <!-- 3x3 grid  -->
                <div class="grid">

                    <!-- bandcamp -->
                    <a href="https://kookiesings.bandcamp.com" class="tile" target="_blank" rel="noopener">
                        <span class="icon-wrap" aria-hidden="true"><img src="assets/bandcampaero.png" alt=""></span>
                        <span class="label">Bandcamp</span>
                    </a>

                    <!--  spotify -->
                    <a href="https://open.spotify.com/artist/4lXLshdg09Wxh0oPdSNNwW" class="tile" target="_blank" rel="noopener">
                        <span class="icon-wrap" aria-hidden="true"><img src="assets/Spotify_2008_Icon.svg" style="scale: .16;" alt=""></span>
                        <span class="label">Spotify</span>
                    </a>

                    <!--  apple music -->
                    <a href="https://music.apple.com/us/artist/kookie/1740516196" class="tile" target="_blank" rel="noopener">
                        <span class="icon-wrap" aria-hidden="true"><img src="assets/itunes1.ico" style="scale: .5;" alt=""></span>
                        <span class="label">Apple Music</span>
                    </a>

                    <!-- main website -->
                    <a href="https://kookie.music" class="tile" target="_blank" rel="noopener">
                        <span class="icon-wrap" aria-hidden="true"><img src="assets/vista_netcenter.ico" style="scale: .3;" alt=""></span>
                        <span class="label">Website</span>
                    </a>

                    <!-- prerelease (special orange glow) -->
                    <a href="https://distrokid.com/hyperfollow/kookie2/kiss-u-on-the-lips-3c" class="tile tile-prerelease" target="_blank" rel="noopener">
                        <span class="icon-wrap" aria-hidden="true"><img src="assets/latestrelease.png" style="scale: .15;" alt=""></span>
                        <span class="label">New Release</span>
                    </a>

                    <!-- merch store -->
                    <a href="https://merch.kookie.music" class="tile" target="_blank" rel="noopener">
                        <span class="icon-wrap" aria-hidden="true"><img src="assets/merch.png" style="scale: .4;" alt=""></span>
                        <span class="label">Merch</span>
                    </a>



                    <!-- bsky -->
                    <a href="https://bsky.app/profile/kookie.music" class="tile" target="_blank" rel="noopener">
                        <span class="icon-wrap" aria-hidden="true"><img src="assets/bluesky.png" style="scale: .5;" alt=""></span>
                        <span class="label">bluesky</span>
                    </a>

                    <!-- youtube -->
                    <a href="https://www.youtube.com/@Kookie_Sings" class="tile" target="_blank" rel="noopener">
                        <span class="icon-wrap" aria-hidden="true"><img src="assets/yt.svg" style="scale: 1.5;" alt=""></span>
                        <span class="label">YouTube</span>
                    </a>

                    <!-- tiktok  -->
                    <a href="https://www.tiktok.com/@kookie_sings" class="tile" target="_blank" rel="noopener">
                        <span class="icon-wrap" aria-hidden="true"><img src="assets/tiktok.png" style="scale: .13;" alt=""></span>
                        <span class="label">TikTok</span>
                    </a>

                </div>

                <!-- now playing -->
                <div class="footer">
                    <div class="now"><span></span>select · play</div>
                    <div class="battery">
                        <span class="bar"></span>
                        <span>●</span>
                    </div>
                </div>

            </div>
        <img src="assets/phonebody.png" alt="" class="phonebody">
    </div>
</body>
</html>
